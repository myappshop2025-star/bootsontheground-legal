<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Identity verification — Boots on the Ground</title>
  <link rel="stylesheet" href="legal.css" />
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      color: #111827;
      line-height: 1.6;
      margin: 0;
      padding: 32px 20px;
    }
    main {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 28px 24px;
    }
    h1 {
      font-size: 1.5rem;
      color: #3d6ba8;
      margin-top: 0;
    }
    p { margin: 0 0 14px; }
    .muted { color: #6b7280; font-size: 0.95rem; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <main>
    <h1>Identity verification complete</h1>
    <p>Stripe has finished your ID check.</p>
    <p class="muted">
      Return to <strong>Boots on the Ground</strong> and tap <strong>Refresh status</strong> or
      <strong>Continue</strong> on the identity verification screen.
    </p>
    <p class="muted">If the app did not open automatically, switch back to the app manually. You can close this page.</p>
    <p class="muted"><a href="index.html">Legal hub</a></p>
  </main>
  <script>
    // Deep-link back into the app after content is visible (Safari / in-app browser after Stripe).
    setTimeout(function () {
      window.location.href = 'myapp://stripe-identity-return';
    }, 600);
  </script>
</body>
</html>
